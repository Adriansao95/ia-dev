<script>
const WIN = 300; // minutos por ventana
const DUR_MS = WIN * 60 * 1000;

const $ = id => document.getElementById(id);
const aMin = t => { const [h, m] = t.split(":").map(Number); return h * 60 + m; };
const aHora = m => {
  m = Math.max(0, Math.round(m / 5) * 5);
  return String(Math.floor(m / 60)).padStart(2, "0") + ":" + String(m % 60).padStart(2, "0");
};
const css = v => getComputedStyle(document.documentElement).getPropertyValue(v).trim();

/* ================= i18n ================= */

const STR = {

let lang = localStorage.getItem("v5_lang") || "es";
const t = k => STR[lang][k];

function aplicarIdioma() {
  document.documentElement.lang = lang;
  $("idioma").textContent = lang === "es" ? "EN" : "ES";
  document.querySelectorAll("[data-i18n]").forEach(el => { el.textContent = t(el.dataset.i18n); });
  document.querySelectorAll("[data-i18n-html]").forEach(el => { el.innerHTML = t(el.dataset.i18nHtml); });
  $("toggleBloque2").textContent = t(bloque2on ? "b2_rm" : "b2_add");
  $("togglePausa").textContent = t(pausaOn ? "pausa_rm" : "pausa_add");
  $("descargar").textContent = t("btn_ics");
  $("copiar").textContent = t("btn_msg");
  $("compartir").textContent = t("btn_share");
  $("exportar").textContent = t("btn_png");
  $("abrirVentana").textContent = t("vivo_btn");
  $("vivoReiniciar").textContent = t("vivo_next");
  $("vivoDescartar").textContent = t("vivo_discard");
  $("wizardCerrar").textContent = t("wiz_close");
  calcular(); ritmoSemanal(); tickVivo(); pintarHist();
}

$("idioma").addEventListener("click", () => {
  lang = lang === "es" ? "en" : "es";
  localStorage.setItem("v5_lang", lang);
  aplicarIdioma();
});

/* ================= controles ================= */

let modo = "horario", intensidad = "normal", bloque2on = false, pausaOn = false;
let estado = null;

function segmento(contId, attr, onPick) {
  $(contId).querySelectorAll("button").forEach(b =>
    b.addEventListener("click", () => {
      $(contId).querySelectorAll("button").forEach(x => x.setAttribute("aria-pressed", x === b));
      onPick(b.dataset[attr]);
    })
  );
}

function marcarSeg(contId, attr, val) {
  $(contId).querySelectorAll("button").forEach(b =>
    b.setAttribute("aria-pressed", b.dataset[attr] === val));
}

function aplicarModo(v) {
  modo = v;
  $("grupoHorario").hidden = v === "loop";
  $("grupoLoop").hidden = v === "horario";
  $("zonaBloque2").style.display = v === "horario" ? "block" : "none";
  $("grupoIntensidad").style.display = v === "loop" ? "none" : "grid";
  calcular();
}

segmento("modo", "modo", aplicarModo);
segmento("intensidad", "int", v => { intensidad = v; calcular(); });

$("toggleBloque2").addEventListener("click", () => {
  bloque2on = !bloque2on;
  $("grupoBloque2").hidden = !bloque2on;
  $("toggleBloque2").textContent = t(bloque2on ? "b2_rm" : "b2_add");
  calcular();
});

$("togglePausa").addEventListener("click", () => {
  pausaOn = !pausaOn;
  $("grupoPausa").hidden = !pausaOn;
  $("togglePausa").textContent = t(pausaOn ? "pausa_rm" : "pausa_add");
  calcular();
});

$("dias").querySelectorAll("button").forEach(b =>
  b.addEventListener("click", () => {
    b.setAttribute("aria-pressed", b.getAttribute("aria-pressed") !== "true");
    pintar();
  })
);

document.querySelectorAll(".info-btn").forEach(b =>
  b.addEventListener("click", () => {
    const panel = $(b.dataset.info);
    panel.hidden = !panel.hidden;
    b.setAttribute("aria-expanded", String(!panel.hidden));
  })
);

["plan", "inicio", "fin", "inicio2", "fin2", "despertar", "dormir", "pausaIni", "pausaFin"].forEach(id =>
  $(id).addEventListener("change", calcular)
);

const diasElegidos = () => [...$("dias").querySelectorAll('[aria-pressed="true"]')].map(b => b.dataset.dia);

function marcarDias(lista) {
  $("dias").querySelectorAll("button").forEach(b =>
    b.setAttribute("aria-pressed", lista.includes(b.dataset.dia)));
}

/* ---- presets ---- */

const PRESETS = {
  oficina:    { modo: "horario", int: "normal", inicio: "09:00", fin: "18:00", dias: ["MO","TU","WE","TH","FR"], pausa: ["13:00","14:00"] },
  freelancer: { modo: "hibrido", int: "tope", inicio: "10:00", fin: "13:00", despertar: "08:00", dormir: "23:00", dias: ["MO","TU","WE","TH","FR"] },
  nocturno:   { modo: "hibrido", int: "tope", inicio: "20:00", fin: "23:30", despertar: "10:00", dormir: "23:55", dias: ["MO","TU","WE","TH","FR","SA","SU"] },
  finde:      { modo: "horario", int: "tope", inicio: "10:00", fin: "18:00", dias: ["SA","SU"] },
};

function aplicarPreset(nombre) {
  const p = PRESETS[nombre];
  if (p.inicio) $("inicio").value = p.inicio;
  if (p.fin) $("fin").value = p.fin;
  if (p.despertar) $("despertar").value = p.despertar;
  if (p.dormir) $("dormir").value = p.dormir;
  marcarDias(p.dias);
  intensidad = p.int; marcarSeg("intensidad", "int", p.int);
  bloque2on = false; $("grupoBloque2").hidden = true; $("toggleBloque2").textContent = t("b2_add");
  pausaOn = !!p.pausa;
  $("grupoPausa").hidden = !pausaOn;
  $("togglePausa").textContent = t(pausaOn ? "pausa_rm" : "pausa_add");
  if (p.pausa) { $("pausaIni").value = p.pausa[0]; $("pausaFin").value = p.pausa[1]; }
  marcarSeg("modo", "modo", p.modo);
  aplicarModo(p.modo);
}

$("presets").querySelectorAll("[data-preset]").forEach(b =>
  b.addEventListener("click", () => aplicarPreset(b.dataset.preset))
);

    { q: "wiz_q2", ops: [["Claude Pro", "pro"], ["Claude Max 5x", "max5"], ["Claude Max 20x", "max20"]], key: "plan", lit: true },
    { q: "wiz_q3", ops: [["wiz_q3a", "semana"], ["wiz_q3b", "todos"], ["wiz_q3c", "finde"]], key: "dias" },
  ];
  const p = pasos[wiz.paso];
  $("wizardTitulo").textContent = `${wiz.paso + 1}/3 · ${t(p.q)}`;
  $("wizardOpciones").innerHTML = "";
  p.ops.forEach(([label, val]) => {
    const b = document.createElement("button");
    b.textContent = p.lit ? label : t(label);
    b.addEventListener("click", () => {
      wiz.resp[p.key] = val;
      if (wiz.paso < 2) { wiz.paso++; wizardPinta(); }
      else wizardAplicar();
    });
    $("wizardOpciones").appendChild(b);
  });
}

function wizardAplicar() {
  $("wizardFondo").hidden = true;
  $("plan").value = wiz.resp.plan;
  marcarDias(wiz.resp.dias === "todos" ? ["MO","TU","WE","TH","FR","SA","SU"]
    : wiz.resp.dias === "finde" ? ["SA","SU"] : ["MO","TU","WE","TH","FR"]);
  marcarSeg("modo", "modo", wiz.resp.modo);
  aplicarModo(wiz.resp.modo);
  $("resultado").scrollIntoView({ behavior: "smooth" });
}

$("wizardAbrir").addEventListener("click", () => { wiz.paso = 0; wiz.resp = {}; wizardPinta(); $("wizardFondo").hidden = false; });
$("wizardCerrar").addEventListener("click", () => { $("wizardFondo").hidden = true; });

/* ================= cálculo ================= */

function fallar(msg) {
  $("error").textContent = msg;
  $("error").style.display = msg ? "block" : "none";
  if (msg) $("resultado").hidden = true;
}

// cadena de ventanas alineada a un bloque [S,E]
function cadenaBloque(S, E, tope) {
  const L = E - S;
  const n = tope ? Math.floor((L - 1) / WIN) + 2 : Math.ceil(L / WIN);
  const crudo = tope ? S + (L - (n - 2) * WIN) / 2 - WIN : S + L / n - WIN;
  return { t0: Math.max(0, Math.round(crudo / 5) * 5), n };
}

// pausa + espaciado mínimo de 5 h entre aperturas
function ajustarAlarmas(alarmas, pausa, limite) {
  const out = [];
  let prev = -Infinity;
  for (const a of alarmas.sort((x, y) => x.min - y.min)) {
    let m = Math.max(a.min, prev + WIN);
    if (pausa && m >= pausa[0] && m < pausa[1]) m = Math.max(pausa[1], prev + WIN);
    m = Math.round(m / 5) * 5;
    if (m >= 1440 || (limite != null && m >= limite)) continue;
    out.push({ min: m, titulo: a.titulo });
    prev = m;
  }
  return out;
}

function calcular() {
  fallar("");
  $("planHint").textContent = t("plan_" + $("plan").value);
  const tope = intensidad === "tope";
  let alarmas = [];
  const bloques = [];
  let notaExtra = "", limite = null;

  let pausa = null;
  if (pausaOn) {
    const pI = aMin($("pausaIni").value), pF = aMin($("pausaFin").value);
    if (pF <= pI) return fallar(t("err_pausa"));
    pausa = [pI, pF];
  }

  if (modo === "horario" || modo === "hibrido") {
    const S = aMin($("inicio").value), E = aMin($("fin").value);
    if (E <= S) return fallar(t("err_bloque"));
    bloques.push([S, E]);

    if (modo === "horario") {
      const { t0, n } = cadenaBloque(S, E, tope);
      for (let k = 0; k < n; k++)
        alarmas.push({ min: t0 + WIN * k, titulo: k === 0 ? t("t_abre") : t("t_recarga") });

      if (bloque2on) {
        const S2 = aMin($("inicio2").value), E2 = aMin($("fin2").value);
        if (E2 <= S2) return fallar(t("err_b2"));
        if (S2 < E) return fallar(t("err_b2_orden"));
        bloques.push([S2, E2]);
        const c2 = cadenaBloque(S2, E2, tope);
        const finCadena1 = t0 + WIN * n;
        let t02 = c2.t0;
        if (t02 < finCadena1) {
          t02 = Math.round(finCadena1 / 5) * 5;
          notaExtra = t("expl_b2");
        }
        for (let k = 0; k < c2.n; k++)
          alarmas.push({ min: t02 + WIN * k, titulo: k === 0 ? t("t_abre") : t("t_recarga") });
      }
    } else {
      // híbrido: la cadena se ancla al bloque y se extiende por todo el día despierto
      const W = aMin($("despertar").value), D = aMin($("dormir").value);
      if (D <= W) return fallar(t("err_sueno"));
      limite = D;
      const { t0 } = cadenaBloque(S, E, tope);
      const first = t0 >= W ? t0 - WIN * Math.floor((t0 - W) / WIN) : W;
      for (let m = first; m < D; m += WIN) {
        const enBloque = m < E && m + WIN > S;
        alarmas.push({ min: m, titulo: m === first ? t("t_abre") : (enBloque ? t("t_recarga") : t("t_cadena")) });
      }
      if (!alarmas.length) return fallar(t("err_fuera"));
      notaExtra = t("expl_hib");
    }
  } else {
    const W = aMin($("despertar").value), D = aMin($("dormir").value);
    if (D <= W) return fallar(t("err_sueno"));
    limite = D;
    for (let m = W; m < D; m += WIN)
      alarmas.push({ min: m, titulo: m === W ? t("t_primera") : t("t_cadena") });
  }

  alarmas = ajustarAlarmas(alarmas, pausa, limite);
  if (!alarmas.length) return fallar(t("err_fuera"));

  estado = {
    alarmas, bloques, notaExtra, pausa,
    ventanas: alarmas.map(a => [a.min, Math.min(a.min + WIN, 1440)]),
  };
  pintar();
}

/* ================= render ================= */

function pintar() {
  if (!estado) return;
  const { alarmas, bloques, ventanas, notaExtra, pausa } = estado;
  const n = ventanas.length;
  $("resultado").hidden = false;

  $("legChipWin").style.background = css("--win-b");
  $("legChipWork").style.background = css("--work");
  $("legTri").style.color = css("--work");

  $("statVentanas").textContent = n;
  $("statVentanasLabel").textContent = t(n === 1 ? "stat_v1" : "stat_vn");
  $("statPrimera").textContent = aHora(alarmas[0].min);
  $("leyendaPausa").style.display = pausa ? "inline-flex" : "none";

  if (bloques.length) {
    const enBloque = ventanas.filter(v => bloques.some(b => v[0] < b[1] && v[1] > b[0])).length;
    $("statCapacidad").textContent = enBloque + "×";
    $("statCapacidadLabel").textContent = t(bloques.length > 1 ? "stat_cap_bs" : "stat_cap_b");
    $("leyendaBloque").style.display = "inline-flex";
    $("explicacion").textContent =
      (enBloque === 1 ? t("expl_1") : t("expl_n")(enBloque, bloques.length > 1)) + notaExtra;
    const rescatadas = Math.max(0, enBloque - bloques.length) * 5 * Math.max(1, diasElegidos().length);
    $("statRescView").style.display = rescatadas ? "grid" : "none";
    $("statResc").textContent = "+" + rescatadas + " h";
  } else {
    const horas = Math.round((ventanas[n - 1][1] - ventanas[0][0]) / 60);
    $("statCapacidad").textContent = horas + " h";
    $("statCapacidadLabel").textContent = t("stat_cob");
    $("leyendaBloque").style.display = "none";
    $("statRescView").style.display = "none";
    $("explicacion").textContent = t("expl_loop")(n);
  }

  const dias = diasElegidos();
  $("listaAlarmas").innerHTML = alarmas.map(a =>
    `<div class="alarma"><span class="icono">🔔</span><span class="hora">${aHora(a.min)}</span><span class="que">${a.titulo}</span><a class="gcal" target="_blank" rel="noopener" href="${gcalURL(a, dias)}">${t("gcal")}</a></div>`
  ).join("");

  $("timeline").innerHTML = timelineSVG();
}

// SVG con colores resueltos (hex) para que también sirva al exportar PNG
function timelineSVG() {
  const { alarmas, bloques, ventanas, pausa } = estado;
  const C = {
    grid: css("--grid"), muted: css("--muted"), ink: css("--ink"), ink2: css("--ink-2"),
    winA: css("--win-a"), winB: css("--win-b"), work: css("--work"),
  };
  const Wpx = 692, H = 112, y0 = 42, hBar = 26;
  const x = min => 12 + (min / 1440) * (Wpx - 24);
  let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${Wpx} ${H}" width="100%" font-family="system-ui, sans-serif" role="img" aria-label="Timeline">`;
  for (let h = 0; h <= 24; h += 3) {
    const px = x(h * 60);
    svg += `<line x1="${px}" y1="${y0 - 4}" x2="${px}" y2="${y0 + hBar + 16}" stroke="${C.grid}"/>`;
    svg += `<text x="${px}" y="${H - 8}" text-anchor="middle" font-size="10" fill="${C.muted}">${String(h).padStart(2, "0")}</text>`;
  }
  if (pausa)
    svg += `<rect x="${x(pausa[0])}" y="${y0}" width="${x(pausa[1]) - x(pausa[0])}" height="${hBar}" rx="5" fill="${C.grid}" opacity="0.7"><title>☕ ${aHora(pausa[0])}–${aHora(pausa[1])}</title></rect>`;
  bloques.forEach(b => {
    svg += `<rect x="${x(b[0])}" y="${y0 + hBar + 6}" width="${x(b[1]) - x(b[0])}" height="6" rx="3" fill="${C.work}"><title>${aHora(b[0])}–${aHora(b[1])}</title></rect>`;
  });
  ventanas.forEach(([a, b], i) => {
    const wpx = x(b) - x(a) - 2;
    svg += `<rect x="${x(a) + 1}" y="${y0}" width="${wpx}" height="${hBar}" rx="5" fill="${i % 2 ? C.winA : C.winB}"><title>V${i + 1}: ${aHora(a)}–${aHora(b)}</title></rect>`;
    if (wpx > 46)
      svg += `<text x="${x(a) + wpx / 2 + 1}" y="${y0 + hBar / 2 + 4}" text-anchor="middle" font-size="10.5" font-weight="700" fill="${i % 2 ? C.ink : "#fff"}">V${i + 1}</text>`;
  });
  alarmas.forEach(a => {
    svg += `<path d="M ${x(a.min)} ${y0 - 7} l 5.5 -9 l -11 0 z" fill="${C.work}"/>`;
    svg += `<text x="${x(a.min)}" y="${y0 - 21}" text-anchor="middle" font-size="10" font-weight="600" fill="${C.ink2}">${aHora(a.min)}</text>`;
  });
  return svg + "</svg>";
}

matchMedia("(prefers-color-scheme: dark)").addEventListener("change", () => { pintar(); pintarHist(); });

/* ================= exportar PNG ================= */

function exportarPNG() {
  const svg = timelineSVG().replace('width="100%"', 'width="1384" height="224"');
  const img = new Image();
  img.onload = () => {
    const cv = document.createElement("canvas");
    cv.width = 1440; cv.height = 400;
    const ctx = cv.getContext("2d");
    ctx.fillStyle = css("--surface"); ctx.fillRect(0, 0, cv.width, cv.height);
    ctx.fillStyle = css("--ink");
    ctx.font = "700 40px system-ui, sans-serif";
    ctx.fillText(t("png_title"), 28, 62);
    ctx.drawImage(img, 28, 100);
    ctx.fillStyle = css("--muted");
    ctx.font = "600 24px system-ui, sans-serif";
    ctx.fillText(t("png_brand"), 28, 372);
    cv.toBlob(blob => {
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url; link.download = "tokentiming-cronograma.png"; link.click();
      URL.revokeObjectURL(url);
    });
  };
  img.src = "data:image/svg+xml;charset=utf-8," + encodeURIComponent(svg);
}

/* ================= calendario ================= */

function proximaFecha(dias) {
  const idxDia = { SU: 0, MO: 1, TU: 2, WE: 3, TH: 4, FR: 5, SA: 6 };
  const d = new Date();
  while (!dias.some(dd => idxDia[dd] === d.getDay())) d.setDate(d.getDate() + 1);
  return d.getFullYear() + String(d.getMonth() + 1).padStart(2, "0") + String(d.getDate()).padStart(2, "0");
}

function gcalURL(a, dias) {
  if (!dias.length) return "#";
  const fecha = proximaFecha(dias);
  const ini = fecha + "T" + aHora(a.min).replace(":", "") + "00";
  const fin = fecha + "T" + aHora(a.min + 5).replace(":", "") + "00";
  return "https://calendar.google.com/calendar/render?action=TEMPLATE"
    + "&text=" + encodeURIComponent("🔔 " + a.titulo)
    + "&dates=" + ini + "/" + fin
    + "&recur=" + encodeURIComponent("RRULE:FREQ=WEEKLY;BYDAY=" + dias.join(","))
    + "&details=" + encodeURIComponent("TokenTiming");
}

function descargarICS() {
  const dias = diasElegidos();
  if (!dias.length) return fallar(t("err_dias"));
  const fecha = proximaFecha(dias);
  const byday = dias.join(",");

  let ics = "BEGIN:VCALENDAR\r\nVERSION:2.0\r\nPRODID:-//TokenTiming//ES\r\n";
  estado.alarmas.forEach((a, i) => {
    const hora = aHora(a.min).replace(":", "") + "00";
    ics += "BEGIN:VEVENT\r\n"
      + `UID:tokentiming-${i}-${fecha}@tokentiming\r\n`
      + `DTSTART:${fecha}T${hora}\r\n`
      + "DURATION:PT5M\r\n"
      + `RRULE:FREQ=WEEKLY;BYDAY=${byday}\r\n`
      + `SUMMARY:🔔 ${a.titulo}\r\n`
      + "BEGIN:VALARM\r\nACTION:DISPLAY\r\nTRIGGER:-PT0M\r\nDESCRIPTION:TokenTiming\r\nEND:VALARM\r\n"
      + "END:VEVENT\r\n";
  });
  ics += "END:VCALENDAR\r\n";

  const url = URL.createObjectURL(new Blob([ics], { type: "text/calendar" }));
  const link = document.createElement("a");
  link.href = url; link.download = "tokentiming-alarmas.ics"; link.click();
  URL.revokeObjectURL(url);
}

function feedbackBoton(id, texto, claveOriginal) {
  $(id).textContent = texto;
  setTimeout(() => { $(id).textContent = t(claveOriginal); }, 2000);
}

function copiarDisparador() {
  navigator.clipboard.writeText(t("disparador"))
    .then(() => feedbackBoton("copiar", t("btn_msg_ok"), "btn_msg"));
}

function compartirSetup() {
  const p = new URLSearchParams();
  p.set("m", modo); p.set("p", $("plan").value); p.set("x", intensidad); p.set("l", lang);
  p.set("i", $("inicio").value); p.set("f", $("fin").value);
  if (bloque2on) { p.set("i2", $("inicio2").value); p.set("f2", $("fin2").value); }
  if (pausaOn) { p.set("pi", $("pausaIni").value); p.set("pf", $("pausaFin").value); }
  p.set("w", $("despertar").value); p.set("s", $("dormir").value);
  p.set("d", diasElegidos().join(","));
  navigator.clipboard.writeText(location.href.split("?")[0] + "?" + p.toString())
    .then(() => feedbackBoton("compartir", t("btn_share_ok"), "btn_share"));
}

function cargarSetup() {
  const p = new URLSearchParams(location.search);
  if (!p.size) return;
  const set = (id, v) => { if (v) $(id).value = v; };
  if (p.get("l")) lang = p.get("l");
  set("plan", p.get("p")); set("inicio", p.get("i")); set("fin", p.get("f"));
  set("despertar", p.get("w")); set("dormir", p.get("s"));
  if (p.get("i2")) {
    bloque2on = true; $("grupoBloque2").hidden = false;
    set("inicio2", p.get("i2")); set("fin2", p.get("f2"));
  }
  if (p.get("pi")) {
    pausaOn = true; $("grupoPausa").hidden = false;
    set("pausaIni", p.get("pi")); set("pausaFin", p.get("pf"));
  }
  if (p.get("d")) marcarDias(p.get("d").split(","));
  if (p.get("x")) { intensidad = p.get("x"); marcarSeg("intensidad", "int", intensidad); }
  if (p.get("m")) { modo = p.get("m"); marcarSeg("modo", "modo", modo); }
  $("grupoHorario").hidden = modo === "loop";
  $("grupoLoop").hidden = modo === "horario";
  $("zonaBloque2").style.display = modo === "horario" ? "block" : "none";
  $("grupoIntensidad").style.display = modo === "loop" ? "none" : "grid";
}

/* ================= ventana en vivo ================= */

const LS_OPEN = "v5_open", LS_NOTIF = "v5_notified", LS_NOTIF30 = "v5_notified30", LS_HIST = "v5_hist";

function abrirVentanaVivo() {
  localStorage.setItem(LS_OPEN, Date.now());
  localStorage.removeItem(LS_NOTIF);
  localStorage.removeItem(LS_NOTIF30);
  const hist = JSON.parse(localStorage.getItem(LS_HIST) || "[]");
  hist.push(Date.now());
  localStorage.setItem(LS_HIST, JSON.stringify(hist.slice(-500)));
  if ("Notification" in window && Notification.permission === "default")
    Notification.requestPermission();
  tickVivo(); pintarHist();
}

function descartarVivo() {
  localStorage.removeItem(LS_OPEN);
  localStorage.removeItem(LS_NOTIF);
  localStorage.removeItem(LS_NOTIF30);
  tickVivo();
}

function notificar(clave, flag) {
  if (!localStorage.getItem(flag) && "Notification" in window && Notification.permission === "granted") {
    new Notification("⏳ TokenTiming", { body: t(clave) });
    localStorage.setItem(flag, "1");
  }
}

function tickVivo() {
  const abierta = Number(localStorage.getItem(LS_OPEN));
  const activo = abierta > 0;
  $("vivoOff").hidden = activo;
  $("vivoOn").hidden = !activo;
  if (!activo) return;

  const resta = abierta + DUR_MS - Date.now();
  const fin = new Date(abierta + DUR_MS);
  const finTxt = String(fin.getHours()).padStart(2, "0") + ":" + String(fin.getMinutes()).padStart(2, "0");

  if (resta > 0) {
    const h = Math.floor(resta / 3600000), m = Math.floor(resta / 60000) % 60, s = Math.floor(resta / 1000) % 60;
    $("vivoTiempo").textContent = `${h}:${String(m).padStart(2, "0")}:${String(s).padStart(2, "0")}`;
    $("vivoBarra").style.width = (100 * (1 - resta / DUR_MS)).toFixed(1) + "%";
    const muriendo = resta < 30 * 60000;
    $("vivoBarraCont").classList.toggle("alerta", muriendo);
    $("vivoDetalle").textContent = muriendo ? t("vivo_dying")(finTxt) : t("vivo_run")(finTxt);
    if (muriendo) notificar("notif_dying", LS_NOTIF30);
    $("vivoReiniciar").hidden = true;
  } else {
    $("vivoTiempo").textContent = t("vivo_full_t");
    $("vivoBarra").style.width = "100%";
    $("vivoBarraCont").classList.remove("alerta");
    $("vivoDetalle").textContent = t("vivo_full");
    $("vivoReiniciar").hidden = false;
    notificar("notif_full", LS_NOTIF);
  }
}

/* ---- historial ---- */

function pintarHist() {
  const hist = JSON.parse(localStorage.getItem(LS_HIST) || "[]");
  $("histZona").hidden = !hist.length;
  if (!hist.length) return;

  const cuentas = Array.from({ length: 7 }, () => new Array(24).fill(0));
  hist.forEach(ts => {
    const d = new Date(ts);
    cuentas[(d.getDay() + 6) % 7][d.getHours()]++; // lunes = fila 0
  });
  const max = Math.max(...cuentas.flat(), 1);
  const nombres = ["d_mo", "d_tu", "d_we", "d_th", "d_fr", "d_sa", "d_su"].map(k => t(k));
  const cw = 24, ch = 16, x0 = 40;
  const W = x0 + 24 * cw + 8, H = 7 * ch + 26;
  let svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 ${W} ${H}" width="100%" font-family="system-ui, sans-serif">`;
  const acc = css("--accent"), grid = css("--grid"), muted = css("--muted");
  for (let f = 0; f < 7; f++) {
    svg += `<text x="${x0 - 8}" y="${f * ch + 12}" text-anchor="end" font-size="9" fill="${muted}">${nombres[f]}</text>`;
    for (let h = 0; h < 24; h++) {
      const c = cuentas[f][h];
      const op = c ? (0.2 + 0.8 * c / max).toFixed(2) : 0;
      svg += `<rect x="${x0 + h * cw}" y="${f * ch}" width="${cw - 2}" height="${ch - 2}" rx="3" fill="${c ? acc : grid}" ${c ? `opacity="${op}"` : 'opacity="0.4"'}><title>${nombres[f]} ${String(h).padStart(2, "0")}:00 — ${c}</title></rect>`;
    }
  }
  for (let h = 0; h < 24; h += 6)
    svg += `<text x="${x0 + h * cw}" y="${7 * ch + 14}" font-size="9" fill="${muted}">${String(h).padStart(2, "0")}</text>`;
  $("histMapa").innerHTML = svg + "</svg>";
}

/* ================= ritmo semanal ================= */

function ritmoSemanal() {
  const pct = Number($("pctUsado").value);
  if (!$("pctUsado").value || pct < 0 || pct > 100) { $("ritmoOut").hidden = true; return; }
  const diaReset = Number($("diaReset").value);
  const [hR, mR] = $("horaReset").value.split(":").map(Number);
  const ahora = new Date();
  const ultimoReset = new Date(ahora);
  ultimoReset.setHours(hR, mR, 0, 0);
  ultimoReset.setDate(ultimoReset.getDate() - ((ahora.getDay() - diaReset + 7) % 7));
  if (ultimoReset > ahora) ultimoReset.setDate(ultimoReset.getDate() - 7);
  const esperado = Math.min(100, 100 * (ahora - ultimoReset) / (7 * 86400000));

  $("ritmoOut").hidden = false;
  $("barraUsado").style.width = pct + "%";
  $("barraEsperado").style.width = esperado.toFixed(0) + "%";
  $("pctUsadoTxt").textContent = pct + "%";
  $("pctEsperadoTxt").textContent = esperado.toFixed(0) + "%";

  const delta = pct - esperado;
  $("ritmoMsg").textContent =
    delta > 12 ? t("ritmo_fast")(pct, esperado.toFixed(0)) :
    delta < -12 ? t("ritmo_slow")(pct, esperado.toFixed(0)) :
    t("ritmo_ok");
}
